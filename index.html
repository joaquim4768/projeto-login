<!DOCTYPE html>

 <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

        <section>
            <div id="imagem">
                
            </div>

            <div id="form">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="login.php" method="post">

                    <div id="email">
                        <label for="imail"><span class="material-symbols-outlined">person</span></label>

                    <div id="senha">
                        <label for="isenha"><span class="material-symbols-outlined">key</span></label>
                        <input type="password" name="senha" id="isenha" placeholder="sua senha"><br>
                    </div>

                    <div id="entrar">
                        <button type="submit">Entrar</button>
                    </div>
                    
                    <div id="esSenha">

            </div>

        </section>
